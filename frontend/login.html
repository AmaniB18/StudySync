<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync – Sign In</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-logo">
      <div class="logo-icon">👥</div>
      <span>StudySync</span>
    </div>

    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your account to continue</p>

    <div class="form-group">
      <label>Email Address</label>
      <input class="form-control" type="email" id="email" placeholder="you@university.edu">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input class="form-control" type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="login()">Sign In</button>

    <div id="loginError" style="color:var(--red);font-size:13px;text-align:center;margin-top:12px;display:none"></div>

    <p class="auth-link">Don't have an account? <a href="signup.html">Create one</a></p>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = 'index.html';

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Please enter email and password';
        errEl.style.display = 'block';
        return;
      }

      const res = await fetch('http://127.0.0.1:5000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        localStorage.setItem('token', data.token || data.access_token);
        localStorage.setItem('sid', data.sid || data.student_id || '');
        window.location.href = 'index.html';
      } else {
        errEl.textContent = data.message || 'Invalid credentials';
        errEl.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
