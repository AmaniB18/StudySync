<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync – Create Account</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-logo">
      <div class="logo-icon">👥</div>
      <span>StudySync</span>
    </div>

    <h1>Create account</h1>
    <p class="auth-sub">Join StudySync to find your study group</p>

    <div class="form-group">
      <label>Full Name</label>
      <input class="form-control" type="text" id="fullName" placeholder="Your full name">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input class="form-control" type="email" id="email" placeholder="you@university.edu">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input class="form-control" type="password" id="password" placeholder="Choose a strong password">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label>Major</label>
        <input class="form-control" type="text" id="major" placeholder="e.g. CS">
      </div>
      <div class="form-group">
        <label>Year Level</label>
        <select class="form-control" id="yearLevel">
          <option value="1">Year 1</option>
          <option value="2">Year 2</option>
          <option value="3">Year 3</option>
          <option value="4">Year 4</option>
          <option value="5">Year 5</option>
          <option value="6">Year 6</option>
        </select>
      </div>
    </div>

    <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="signup()">Create Account</button>

    <div id="signupError" style="color:var(--red);font-size:13px;text-align:center;margin-top:12px;display:none"></div>
    <div id="signupSuccess" style="color:var(--green);font-size:13px;text-align:center;margin-top:12px;display:none"></div>

    <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = 'index.html';

    async function signup() {
      const errEl = document.getElementById('signupError');
      const okEl = document.getElementById('signupSuccess');
      errEl.style.display = 'none';
      okEl.style.display = 'none';

      const full_name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const major = document.getElementById('major').value.trim();
      const year_level = Number(document.getElementById('yearLevel').value);

      if (!full_name || !email || !password) {
        errEl.textContent = 'Please fill in all required fields';
        errEl.style.display = 'block';
        return;
      }

      const res = await fetch('http://127.0.0.1:5000/students', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name, email, password, major, year_level })
      });

      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        okEl.textContent = 'Account created! Redirecting to login...';
        okEl.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 1500);
      } else {
        errEl.textContent = data.message || 'Failed to create account';
        errEl.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') signup();
    });
  </script>
</body>
</html>
